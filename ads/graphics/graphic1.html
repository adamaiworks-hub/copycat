<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0d1117;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Background glow */
  .glow {
    position: absolute;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(63,185,80,.12) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Grid lines */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 80px;
  }

  .label {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #3fb950;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .label::before, .label::after {
    content: '';
    width: 40px; height: 1px;
    background: #3fb950;
    opacity: .5;
  }

  .amount {
    font-size: 160px;
    font-weight: 900;
    color: #3fb950;
    line-height: 1;
    letter-spacing: -6px;
    margin-bottom: 8px;
    text-shadow: 0 0 80px rgba(63,185,80,.3);
  }

  .currency {
    font-size: 64px;
    vertical-align: top;
    margin-top: 24px;
    display: inline-block;
  }

  .subtitle {
    font-size: 32px;
    color: #8b949e;
    margin-bottom: 60px;
    font-weight: 400;
    line-height: 1.4;
  }
  .subtitle strong { color: #e6edf3; font-weight: 600; }

  .divider {
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, #3fb950, transparent);
    margin: 0 auto 60px;
  }

  .bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .tagline {
    font-size: 28px;
    color: #e6edf3;
    font-weight: 700;
  }
  .tagline span { color: #3fb950; }

  .url {
    font-size: 20px;
    color: #8b949e;
    letter-spacing: 1px;
  }

  .logo {
    position: absolute;
    top: 48px; left: 0; right: 0;
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    color: #e6edf3;
    letter-spacing: .5px;
    z-index: 2;
  }
  .logo span { color: #3fb950; }

  .week-badge {
    position: absolute;
    top: 48px; right: 60px;
    background: rgba(63,185,80,.1);
    border: 1px solid rgba(63,185,80,.3);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 600;
    color: #3fb950;
    z-index: 2;
  }
  @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="grid"></div>

  <div class="logo">Copy<span>Cat</span></div>
  <div class="week-badge">This Week</div>

  <div class="content">
    <div class="label">Top Polymarket Trader</div>
    <div class="amount"><span class="currency">$</span>6.6M</div>
    <div class="subtitle">made in a single week.<br><strong>You could've copied every trade.</strong></div>
    <div class="divider"></div>
    <div class="bottom">
      <div class="tagline">CopyCat mirrors the top traders <span>automatically.</span></div>
      <div class="url">copycat.adam-works.com</div>
    </div>
  </div>
</body>
</html>
