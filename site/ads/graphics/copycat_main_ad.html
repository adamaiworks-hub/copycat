<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; background: #0d1117; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="1080" height="1080"></canvas>
<script>
const C  = document.getElementById('c');
const cx = C.getContext('2d');
const W  = 1080, H = 1080;

// ─── Timing ────────────────────────────────────────────────────────────────
const TOTAL  = 15;   // seconds per loop
const SCENE  = 11;   // scene ends, end-card begins
const SPEED  = 100;  // background scroll px/s

// ─── State ─────────────────────────────────────────────────────────────────
let prev = null, scroll = 0, walkAcc = 0;
let bills = [], lastBill = 0, collected = 0;
let picking = false, pickT = 0, pickIdx = -1;
const PICK_DUR = 0.55;

// Fixed screen positions
const MAN_X = 690, CAT_X = 455, GND = 800;

// ─── Helpers ───────────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function ease(t) { return t < .5 ? 2*t*t : -1+(4-2*t)*t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ─── Bill particles ────────────────────────────────────────────────────────
function spawnBill() {
  bills.push({
    x: MAN_X + 80 + (Math.random()-.5)*18,
    y: GND - 90,
    vx: -(Math.random()*1.8 + .6),
    vy: -(Math.random()*5 + 2),
    rot: (Math.random()-.5)*.7,
    rs: (Math.random()-.5)*.09,
    sc: .75 + Math.random()*.35,
    settled: false, collected: false, alpha: 1,
  });
}

function updateBills(dt) {
  for (let i = bills.length - 1; i >= 0; i--) {
    const b = bills[i];
    if (b.collected) { bills.splice(i, 1); continue; }
    if (!b.settled) {
      b.vy += 480 * dt;
      b.x  += (b.vx - SPEED) * dt;
      b.y  += b.vy * dt;
      b.rot += b.rs;
      if (b.y >= GND - 7) { b.y = GND - 7; b.vy = 0; b.vx = 0; b.settled = true; }
    } else { b.x -= SPEED * dt; }
    if (b.x < -80) bills.splice(i, 1);
  }
}

function checkPickup() {
  if (picking) return;
  for (let i = 0; i < bills.length; i++) {
    const b = bills[i];
    if (b.settled && !b.collected && Math.abs(b.x - CAT_X) < 80) {
      picking = true; pickT = 0; pickIdx = i; return;
    }
  }
}

// ─── DRAW: Background ──────────────────────────────────────────────────────
function drawBg() {
  // Sky gradient
  const sky = cx.createLinearGradient(0, 0, 0, GND);
  sky.addColorStop(0, '#03050a');
  sky.addColorStop(.55, '#080e18');
  sky.addColorStop(1, '#0c1420');
  cx.fillStyle = sky; cx.fillRect(0, 0, W, H);

  // Stars
  cx.fillStyle = 'rgba(255,255,255,.6)';
  [[90,55],[240,30],[390,80],[540,48],[680,72],[840,38],[980,65],
   [140,130],[310,115],[500,125],[730,110],[900,140],[60,190],[460,175],[780,195]
  ].forEach(([sx,sy]) => {
    const px = ((sx - scroll*.045) % (W+100) + W+100) % (W+100);
    cx.beginPath(); cx.arc(px, sy, 1.4, 0, Math.PI*2); cx.fill();
  });

  // Moon glow
  cx.save();
  const mg = cx.createRadialGradient(920, 95, 0, 920, 95, 80);
  mg.addColorStop(0, 'rgba(255,245,200,.18)'); mg.addColorStop(1, 'transparent');
  cx.fillStyle = mg; cx.fillRect(840, 15, 160, 160);
  cx.fillStyle = '#ddd8c0'; cx.beginPath(); cx.arc(920, 95, 44, 0, Math.PI*2); cx.fill();
  cx.fillStyle = '#080e18'; cx.beginPath(); cx.arc(936, 83, 40, 0, Math.PI*2); cx.fill();
  cx.restore();

  // City silhouette
  const bldgs = [
    {x:0,w:120,h:240},{x:130,w:85,h:320},{x:225,w:105,h:200},{x:340,w:145,h:360},
    {x:495,w:95,h:270},{x:600,w:115,h:330},{x:725,w:135,h:250},{x:870,w:108,h:290},{x:988,w:130,h:220}
  ];
  bldgs.forEach(b => {
    const bx = ((b.x - scroll*.17) % (W+300) + W+300) % (W+300) - 200;
    const by = GND - 35 - b.h;
    cx.fillStyle = '#0b1220'; cx.fillRect(bx, by, b.w, b.h);
    // Windows
    for (let wy = by+18; wy < GND-50; wy += 32) {
      for (let wx = bx+12; wx < bx+b.w-12; wx += 24) {
        const lit = Math.sin(wx*2.3+wy*4.1) > .15;
        cx.fillStyle = lit ? 'rgba(255,220,80,.22)' : 'rgba(60,80,120,.08)';
        cx.fillRect(wx, wy, 11, 16);
      }
    }
  });

  // Road surface
  cx.fillStyle = '#0e141e'; cx.fillRect(0, GND - 32, W, 32);
  cx.fillStyle = '#1a2336'; cx.fillRect(0, GND, W, H - GND);

  // Sidewalk tiles
  const tW = 140;
  const off = (scroll % tW + tW) % tW;
  cx.strokeStyle = '#232d3f'; cx.lineWidth = 1.5;
  for (let tx = -off; tx < W + tW; tx += tW) {
    cx.beginPath(); cx.moveTo(tx, GND); cx.lineTo(tx, H); cx.stroke();
  }
  // Curb
  cx.strokeStyle = '#2e3d55'; cx.lineWidth = 4;
  cx.beginPath(); cx.moveTo(0, GND); cx.lineTo(W, GND); cx.stroke();

  // Lamp posts (parallax)
  [120, 420, 720, 1020].forEach(lx => {
    const px = ((lx - scroll*.9) % (W+200) + W+200) % (W+200) - 100;
    cx.fillStyle = '#2a3548'; cx.fillRect(px - 4, GND - 210, 8, 210);
    cx.fillStyle = '#3a4a62'; cx.fillRect(px - 20, GND - 215, 40, 12);
    const glow = cx.createRadialGradient(px, GND - 210, 0, px, GND - 210, 55);
    glow.addColorStop(0, 'rgba(255,230,130,.18)'); glow.addColorStop(1, 'transparent');
    cx.fillStyle = glow; cx.fillRect(px - 55, GND - 265, 110, 110);
    cx.fillStyle = 'rgba(255,230,130,.7)';
    cx.beginPath(); cx.arc(px, GND - 210, 6, 0, Math.PI*2); cx.fill();
  });
}

// ─── DRAW: Dollar bill ─────────────────────────────────────────────────────
function drawBill(x, y, rot, sc, alpha) {
  cx.save();
  cx.globalAlpha = alpha;
  cx.translate(x, y); cx.rotate(rot); cx.scale(sc, sc);
  cx.shadowColor = 'rgba(63,185,80,.35)'; cx.shadowBlur = 6;
  cx.fillStyle = '#1d6b3a'; cx.fillRect(-26, -12, 52, 24);
  cx.shadowBlur = 0;
  cx.strokeStyle = '#2ecc71'; cx.lineWidth = 1;
  cx.strokeRect(-22, -8, 44, 16);
  cx.fillStyle = '#27ae60'; cx.fillRect(-10, -8, 20, 16);
  cx.fillStyle = '#a8e6c0';
  cx.font = 'bold 10px serif'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillText('$100', 0, 0);
  cx.restore();
}

// ─── DRAW: Rich man ────────────────────────────────────────────────────────
function drawMan(x, ph, t) {
  const ls  = Math.sin(ph * Math.PI * 2);
  const bob = Math.abs(ls) * 8;

  cx.save(); cx.translate(x, GND - bob);

  // Shadow
  cx.fillStyle = 'rgba(0,0,0,.45)';
  cx.beginPath(); cx.ellipse(8, 6, 68, 15, 0, 0, Math.PI*2); cx.fill();

  // ── Legs ──
  const lW = 28, lH = 72;
  // back leg
  cx.save(); cx.translate(-26, -30); cx.rotate(ls*.38);
  const lg1 = cx.createLinearGradient(0,0,0,lH);
  lg1.addColorStop(0,'#14143a'); lg1.addColorStop(1,'#0d0d28');
  cx.fillStyle = lg1; cx.fillRect(-lW/2, 0, lW, lH);
  cx.fillStyle = '#0a0a1e';
  cx.beginPath(); cx.ellipse(0, lH+9, 20, 11, 0, 0, Math.PI*2); cx.fill();
  cx.restore();
  // front leg
  cx.save(); cx.translate(18, -30); cx.rotate(-ls*.38);
  const lg2 = cx.createLinearGradient(0,0,0,lH);
  lg2.addColorStop(0,'#1c1c50'); lg2.addColorStop(1,'#10103a');
  cx.fillStyle = lg2; cx.fillRect(-lW/2, 0, lW, lH);
  cx.fillStyle = '#111132';
  cx.beginPath(); cx.ellipse(4, lH+9, 22, 12, 0, 0, Math.PI*2); cx.fill();
  cx.restore();

  // ── Fat body ──
  const bodyG = cx.createRadialGradient(8,-105,20, 8,-105,90);
  bodyG.addColorStop(0,'#1e1e50'); bodyG.addColorStop(1,'#0e0e28');
  cx.fillStyle = bodyG;
  cx.beginPath(); cx.ellipse(8, -108, 84, 94, 0, 0, Math.PI*2); cx.fill();

  // belly highlight
  cx.fillStyle = 'rgba(255,255,255,.04)';
  cx.beginPath(); cx.ellipse(22, -96, 60, 70, .1, 0, Math.PI*2); cx.fill();

  // Dark red vest
  const vestG = cx.createRadialGradient(12,-110,10, 12,-110,55);
  vestG.addColorStop(0,'#8b0000'); vestG.addColorStop(1,'#5a0000');
  cx.fillStyle = vestG;
  cx.beginPath(); cx.ellipse(12,-110, 48, 58, 0, 0, Math.PI*2); cx.fill();

  // Gold watch chain
  cx.strokeStyle = '#d4af37'; cx.lineWidth = 2.5; cx.lineCap = 'round';
  cx.beginPath(); cx.moveTo(-12,-82); cx.quadraticCurveTo(24,-70, 46,-84); cx.stroke();
  cx.fillStyle = '#d4af37'; cx.beginPath(); cx.arc(46,-84,5,0,Math.PI*2); cx.fill();

  // White shirt
  cx.fillStyle = '#f0ece0'; cx.fillRect(-14,-172, 28, 52);

  // Tie
  cx.fillStyle = '#c0100c';
  cx.beginPath();
  cx.moveTo(-10,-166); cx.lineTo(10,-166); cx.lineTo(14,-100);
  cx.lineTo(0,-84); cx.lineTo(-14,-100); cx.closePath(); cx.fill();
  cx.fillStyle = '#8b0a08';
  cx.fillRect(-7,-148,16,6); cx.fillRect(-7,-128,16,6);

  // Bills in pocket — animated wave
  const bw = Math.sin(t*2.6)*.06;
  [[78,-88,-0.28+bw,'#1a6b36','#2ecc71'],
   [68,-82, 0.10,   '#27ae60','#58d68d'],
   [73,-95,-0.06+bw*.5,'#1e8449','#3fb950']
  ].forEach(([bx,by,br,c1,c2]) => {
    cx.save(); cx.translate(bx,by); cx.rotate(br);
    cx.fillStyle=c1; cx.fillRect(-9,-28,24,36);
    cx.fillStyle=c2; cx.fillRect(-9,-28,24,7);
    cx.restore();
  });

  // ── Left arm (cane) ──
  cx.save(); cx.translate(-80,-145); cx.rotate(-ls*.28+.08);
  cx.fillStyle='#14143a'; cx.fillRect(-12,0,24,80);
  cx.fillStyle='#F5C5A3'; cx.beginPath(); cx.arc(0,84,14,0,Math.PI*2); cx.fill();
  cx.strokeStyle='#5D3A1A'; cx.lineWidth=9; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(0,94); cx.lineTo(-6,165); cx.stroke();
  cx.strokeStyle='#d4af37'; cx.lineWidth=8;
  cx.beginPath(); cx.arc(-18,100,17,Math.PI*.5,Math.PI*1.5); cx.stroke();
  cx.restore();

  // ── Right arm ──
  cx.save(); cx.translate(70,-145); cx.rotate(ls*.28-.08);
  cx.fillStyle='#14143a'; cx.fillRect(-12,0,24,80);
  cx.fillStyle='#F5C5A3'; cx.beginPath(); cx.arc(0,84,14,0,Math.PI*2); cx.fill();
  cx.restore();

  // ── Head ──
  const headG = cx.createRadialGradient(2,-198,5,2,-198,56);
  headG.addColorStop(0,'#FDBCB4'); headG.addColorStop(1,'#E8967A');
  cx.fillStyle = headG;
  cx.beginPath(); cx.ellipse(2,-200,54,62,0,0,Math.PI*2); cx.fill();

  // Jowls
  cx.fillStyle='rgba(244,160,144,.7)';
  cx.beginPath(); cx.ellipse(-44,-192,26,22,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(46,-192,26,22,0,0,Math.PI*2); cx.fill();

  // Double chin
  cx.fillStyle='#EDAA98';
  cx.beginPath(); cx.ellipse(6,-158,40,22,0,0,Math.PI*2); cx.fill();

  // Ear
  cx.fillStyle='#FDBCB4'; cx.beginPath(); cx.ellipse(-56,-198,12,18,0,0,Math.PI*2); cx.fill();
  cx.fillStyle='#D4836A'; cx.beginPath(); cx.ellipse(-56,-198,6,11,0,0,Math.PI*2); cx.fill();

  // Eyebrows (bushy gray)
  cx.fillStyle='#aaa';
  [[-36,-228,-0.12],[ 14,-228, 0.12]].forEach(([ex,ey,a]) => {
    cx.save(); cx.translate(ex+14,ey+4); cx.rotate(a);
    cx.beginPath(); cx.ellipse(0,0,18,8,0,0,Math.PI*2); cx.fill();
    cx.restore();
  });

  // Eyes
  cx.fillStyle='#1a1a2e';
  cx.beginPath(); cx.ellipse(-18,-212,8.5,8.5,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(24,-212,8.5,8.5,0,0,Math.PI*2); cx.fill();
  cx.fillStyle='white';
  cx.beginPath(); cx.arc(-15,-215,3,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(27,-215,3,0,Math.PI*2); cx.fill();

  // Eye bags
  cx.fillStyle='rgba(180,120,90,.5)';
  cx.beginPath(); cx.ellipse(-18,-203,10,5,0,0,Math.PI,true); cx.fill();
  cx.beginPath(); cx.ellipse(24,-203,10,5,0,0,Math.PI,true); cx.fill();

  // Monocle
  cx.strokeStyle='#d4af37'; cx.lineWidth=2.5;
  cx.beginPath(); cx.arc(24,-211,14,0,Math.PI*2); cx.stroke();
  cx.beginPath(); cx.moveTo(38,-203); cx.lineTo(48,-184); cx.stroke();

  // Nose
  cx.fillStyle='#C86050';
  cx.beginPath(); cx.ellipse(4,-196,15,13,0,0,Math.PI*2); cx.fill();
  cx.fillStyle='#AA4038';
  cx.beginPath(); cx.ellipse(-4,-200,6.5,6.5,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(12,-200,6.5,6.5,0,0,Math.PI*2); cx.fill();

  // Mustache
  cx.fillStyle='#e0e0e0';
  cx.beginPath(); cx.ellipse(-14,-180,19,12,-.2,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(17,-180,19,12,.2,0,Math.PI*2); cx.fill();
  cx.fillStyle='#ccc';
  cx.beginPath(); cx.arc(-31,-175,10,-.5*.5,Math.PI*.5); cx.fill();
  cx.beginPath(); cx.arc(33,-175,10,Math.PI*.5,Math.PI*1.5); cx.fill();

  // ── Top hat ──
  cx.fillStyle='#090909';
  cx.beginPath(); cx.ellipse(2,-260,76,17,0,0,Math.PI*2); cx.fill();
  const hatG = cx.createLinearGradient(-46,-260,-46,-390);
  hatG.addColorStop(0,'#111'); hatG.addColorStop(1,'#0a0a0a');
  cx.fillStyle=hatG;
  cx.beginPath();
  cx.moveTo(-50,-260); cx.lineTo(-44,-392); cx.lineTo(50,-392); cx.lineTo(56,-260);
  cx.closePath(); cx.fill();
  cx.fillStyle='#d4af37'; cx.fillRect(-48,-280,96,16);
  cx.fillStyle='#b8860b'; cx.fillRect(-14,-283,28,22);
  cx.fillStyle='#d4af37'; cx.fillRect(-9,-279,18,14);

  cx.restore();
}

// ─── DRAW: Gray cat ────────────────────────────────────────────────────────
function drawCat(x, ph, t, pp) {
  const ls  = Math.sin(ph * Math.PI * 2);
  const bob = Math.abs(ls) * 4.5;
  const tw  = Math.sin(t * 4.8) * 22;

  const env    = pp < .5 ? pp*2 : (1-pp)*2;
  const crouch = env * 40;
  const lean   = env * .34;

  cx.save(); cx.translate(x, GND + bob + crouch); cx.rotate(lean);

  // Shadow
  cx.fillStyle='rgba(0,0,0,.32)';
  cx.beginPath(); cx.ellipse(0,8,46,11,0,0,Math.PI*2); cx.fill();

  // Tail — green/gold striped Cheshire
  cx.lineCap='round';
  cx.strokeStyle='#2ea043'; cx.lineWidth=16;
  cx.beginPath(); cx.moveTo(-30,-40); cx.quadraticCurveTo(-82,-96+tw,-72,-142+tw); cx.stroke();
  for (let si=0; si<4; si++) {
    cx.strokeStyle = si%2===0 ? '#f4d03f' : '#1a6b2a';
    cx.lineWidth=7;
    cx.setLineDash([14,14]); cx.lineDashOffset = -si*7;
    cx.beginPath(); cx.moveTo(-30,-40); cx.quadraticCurveTo(-82,-96+tw,-72,-142+tw); cx.stroke();
  }
  cx.setLineDash([]);

  // Back leg — green
  cx.save(); cx.translate(-26,-22); cx.rotate(ls*.43);
  const lG1 = cx.createLinearGradient(0,0,0,42);
  lG1.addColorStop(0,'#3fb950'); lG1.addColorStop(1,'#2ea043');
  cx.fillStyle=lG1; cx.fillRect(-9,0,18,42);
  cx.fillStyle='#d4af37'; cx.beginPath(); cx.ellipse(0,47,14,9,0,0,Math.PI*2); cx.fill();
  cx.restore();

  // Front leg — green
  cx.save(); cx.translate(20,-22);
  cx.rotate(-ls*.43 + env*.95);
  const lG2 = cx.createLinearGradient(0,0,0,42+env*16);
  lG2.addColorStop(0,'#50c060'); lG2.addColorStop(1,'#2a8040');
  cx.fillStyle=lG2; cx.fillRect(-9,0,18,42+env*16);
  cx.fillStyle='#e8c840'; cx.beginPath(); cx.ellipse(0,47+env*16,14,9,0,0,Math.PI*2); cx.fill();
  cx.restore();

  // Body — green/gold Cheshire
  const bodyG = cx.createRadialGradient(0,-62,10, 0,-62,60);
  bodyG.addColorStop(0,'#60d878'); bodyG.addColorStop(1,'#2ea043');
  cx.fillStyle=bodyG;
  cx.beginPath(); cx.ellipse(0,-64,58,62,0,0,Math.PI*2); cx.fill();
  for (let si=0; si<5; si++) {
    cx.save();
    cx.beginPath(); cx.ellipse(0,-64,58,62,0,0,Math.PI*2); cx.clip();
    cx.fillStyle='rgba(244,211,63,.32)';
    cx.fillRect(-70,-130+si*24, 140, 12);
    cx.restore();
  }

  // Belly
  cx.fillStyle='rgba(200,255,210,.7)';
  cx.beginPath(); cx.ellipse(10,-58,34,42,0,0,Math.PI*2); cx.fill();

  // ── Arms ──
  const armSwing = ls * 0.55;  // opposite swing to legs
  const aG = cx.createLinearGradient(0,0,0,52);
  aG.addColorStop(0,'#50c060'); aG.addColorStop(1,'#2ea043');

  // Left arm
  cx.save();
  cx.translate(-52, -88);
  cx.rotate(-0.3 - armSwing);
  cx.fillStyle=aG;
  cx.beginPath(); cx.roundRect(-8, 0, 16, 52, 8); cx.fill();
  // Left paw (3 toe beans)
  cx.fillStyle='#d4af37';
  cx.beginPath(); cx.ellipse(0, 58, 13, 10, 0, 0, Math.PI*2); cx.fill();
  cx.fillStyle='#e8c840';
  cx.beginPath(); cx.ellipse(-10, 54, 7, 6, -0.4, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(10,  54, 7, 6,  0.4, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(0,   52, 7, 5,    0, 0, Math.PI*2); cx.fill();
  cx.restore();

  // Right arm
  cx.save();
  cx.translate(60, -88);
  cx.rotate(0.3 + armSwing);
  cx.fillStyle=aG;
  cx.beginPath(); cx.roundRect(-8, 0, 16, 52, 8); cx.fill();
  // Right paw
  cx.fillStyle='#d4af37';
  cx.beginPath(); cx.ellipse(0, 58, 13, 10, 0, 0, Math.PI*2); cx.fill();
  cx.fillStyle='#e8c840';
  cx.beginPath(); cx.ellipse(-10, 54, 7, 6, -0.4, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(10,  54, 7, 6,  0.4, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(0,   52, 7, 5,    0, 0, Math.PI*2); cx.fill();
  cx.restore();

  // Head — green Cheshire
  const headG = cx.createRadialGradient(8,-130,10, 8,-130,56);
  headG.addColorStop(0,'#80e890'); headG.addColorStop(1,'#2ea043');
  cx.fillStyle=headG;
  cx.beginPath(); cx.arc(8,-130,56,0,Math.PI*2); cx.fill();
  for (let si=0; si<4; si++) {
    cx.save();
    cx.beginPath(); cx.arc(8,-130,56,0,Math.PI*2); cx.clip();
    cx.fillStyle='rgba(244,211,63,.28)';
    cx.fillRect(-70,-196+si*26, 150, 13);
    cx.restore();
  }

  // Puffy Cheshire cheeks
  cx.fillStyle='rgba(100,220,120,.5)';
  cx.beginPath(); cx.ellipse(-42,-120,28,22,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(58,-120,28,22,0,0,Math.PI*2); cx.fill();

  // Ears — poke up from sides of head, behind hat brim (head center 8,-130 radius 56, top ≈ -186)
  // Left ear: on outer-left side of head
  cx.fillStyle='#1a8a36';
  cx.beginPath(); cx.moveTo(-36,-158); cx.lineTo(-44,-200); cx.lineTo(-14,-166); cx.closePath(); cx.fill();
  cx.fillStyle='#ffb3c1';
  cx.beginPath(); cx.moveTo(-33,-161); cx.lineTo(-40,-194); cx.lineTo(-17,-168); cx.closePath(); cx.fill();
  // Right ear: on outer-right side of head
  cx.fillStyle='#1a8a36';
  cx.beginPath(); cx.moveTo(30,-166); cx.lineTo(60,-200); cx.lineTo(52,-158); cx.closePath(); cx.fill();
  cx.fillStyle='#ffb3c1';
  cx.beginPath(); cx.moveTo(33,-168); cx.lineTo(56,-194); cx.lineTo(49,-161); cx.closePath(); cx.fill();

  // Eyes — $$ signs
  function dollarEye(ex,ey) {
    cx.shadowColor='#f1c40f'; cx.shadowBlur=18;
    cx.fillStyle='#1a0e2a';

// ─── DRAW: Pick-up effect ──────────────────────────────────────────────────
function drawPickEffect(x, y, pp) {
  if (pp < .18 || pp > .88) return;
  const frac = (pp-.18)/.7;
  const alpha = frac < .5 ? frac*2 : (1-frac)*2;
  cx.save();
  cx.globalAlpha = alpha;
  // Coins burst
  const sparkPos = [[0,-1],[.7,-.7],[-.7,-.7],[1,0],[-1,0],[.5,.5],[-.5,.5]];
  sparkPos.forEach(([sx,sy]) => {
    cx.fillStyle='#f4d03f';
    cx.shadowColor='#f4d03f'; cx.shadowBlur=8;
    cx.beginPath();
    cx.arc(x+sx*26+sx*frac*14, y+sy*26+sy*frac*14, 5, 0, Math.PI*2);
    cx.fill();
  });
  cx.shadowBlur=0;
  cx.font='bold 28px -apple-system,sans-serif';
  cx.textAlign='center';
  cx.fillStyle='#f4d03f';
  cx.shadowColor='rgba(0,0,0,.5)'; cx.shadowBlur=4;
  cx.fillText('+$100', x, y - 55 - frac*30);
  cx.restore();
}

// ─── Main loop ─────────────────────────────────────────────────────────────
function frame(ts) {
  if (!prev) prev = ts;
  const dt   = clamp((ts - prev) / 1000, 0, .05);
  prev = ts;

  const tAbs  = ts / 1000;
  const tLoop = tAbs % TOTAL;
  const inScene = tLoop < SCENE;
  const endProg = tLoop > SCENE ? (tLoop - SCENE) / (TOTAL - SCENE) : 0;
  const hdrAlpha = inScene ? 1 : clamp(1 - (endProg * 4), 0, 1);
  const fadeIn  = clamp(tLoop / .6, 0, 1);

  if (inScene) { scroll += SPEED * dt; walkAcc += SPEED * dt; }

  const walkPh = (walkAcc / 82) % 1;

  // Spawn bills
  if (inScene && tAbs - lastBill > .9 + Math.random()*.5) {
    spawnBill(); lastBill = tAbs;
  }

  updateBills(dt);
  if (inScene) checkPickup();

  if (picking) {
    pickT += dt / PICK_DUR;
    if (pickT >= 1) {
      picking = false; pickT = 1;
      if (pickIdx >= 0 && bills[pickIdx]) { bills[pickIdx].collected = true; collected++; }
      pickIdx = -1;
    }
  }

  // ── Draw ──────────────────────────────────────────────────────────────
  cx.clearRect(0, 0, W, H);
  drawBg();

  // Bills behind characters
  bills.forEach(b => { if (b.settled) drawBill(b.x, b.y, b.rot, b.sc, b.alpha); });
  bills.forEach(b => { if (!b.settled) drawBill(b.x, b.y, b.rot, b.sc, b.alpha); });

  if (inScene || tLoop < SCENE + .8) {
    drawMan(MAN_X, walkPh, tLoop);
    drawCat(CAT_X, walkPh*.94, tLoop, picking ? pickT : 0);
    if (picking) drawPickEffect(CAT_X + 38, GND - 70, pickT);
    drawCounter(fadeIn);
  }

  drawHeader(hdrAlpha * fadeIn);
  drawEndCard(endProg);

  requestAnimationFrame(frame);
}

// Wait for fonts then start
document.fonts.ready.then(() => requestAnimationFrame(frame));
